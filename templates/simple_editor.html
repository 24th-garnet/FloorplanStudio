<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Simple USDZ Editor — Floorplan Studio</title>
  <link rel="stylesheet" href="/static/simple/style.css" />
</head>
<body>
  <nav class="suite-nav">
    <a href="/">← ホーム</a>
    <span>シンプルエディタ</span>
  </nav>
  <div id="app">
    <aside>
      <h1>RoomPlan USDZ Editor</h1>
      <input id="file" type="file" accept=".usdz" />
      <button id="upload">Import USDZ</button>
      <p class="hint">RoomPlan API出力のUSDA-based USDZを対象に、各objectのtransformのみを編集します。</p>
      <hr />
      <h2>Objects</h2>
      <div id="objects"></div>
      <hr />
      <h2>Transform</h2>
      <div id="editor" class="disabled">
        <label>X <input id="x" type="number" step="0.01"></label>
        <label>Y <input id="y" type="number" step="0.01"></label>
        <label>Z <input id="z" type="number" step="0.01"></label>
        <label>Yaw deg <input id="yaw" type="number" step="1"></label>
        <div class="mode-row">
          <button id="modeTranslate">Translate</button>
          <button id="modeRotate">Rotate</button>
        </div>
        <button id="apply">Apply to selected object</button>
      </div>
      <hr />
      <h2>Viewer</h2>
      <div class="viewer-options">
        <label class="inline-label">
          <input id="showRealModel" type="checkbox" checked>
          <span>Show USDZ model overlay</span>
        </label>
        <label class="inline-label">
          <input id="showProxy" type="checkbox" checked>
          <span>Show editable proxy boxes</span>
        </label>
      </div>
      <a id="download" class="button disabled" href="#">Download edited USDZ</a>
    </aside>
    <main>
      <div id="viewer"></div>
      <div class="overlay">
        左クリック: 選択 / ドラッグ: 回転 / ホイール: ズーム<br>
        選択後は左の数値を変更して Apply してください。
      </div>
    </main>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/static/simple/main.js"></script>
</body>
</html>
